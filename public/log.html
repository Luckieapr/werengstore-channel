<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log - Movabi Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('show')"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">M</div>
            Movabi
        </div>
        <div class="sidebar-menu">
            <div class="menu-lbl">Store Operations</div>
            <a href="/dashboard" class="menu-item"><i class="fa-solid fa-shapes" style="width:20px"></i> Dashboard</a>
            <a href="/my_produk" class="menu-item"><i class="fa-solid fa-cube" style="width:20px"></i> My Produk</a>
            <a href="/kelola_stock" class="menu-item"><i class="fa-solid fa-box-open" style="width:20px"></i> Kelola Stock</a>
            <a href="/voucher_promo" class="menu-item"><i class="fa-solid fa-ticket" style="width:20px"></i> Voucher & Promo</a>
            <a href="/broadcast" class="menu-item"><i class="fa-solid fa-paper-plane" style="width:20px"></i> Broadcast</a>
            
            <div class="menu-lbl" style="margin-top: 24px;">System Administration</div>
            <a href="/users" class="menu-item"><i class="fa-regular fa-user" style="width:20px"></i> Users & Saldo</a>
            <a href="/settings" class="menu-item"><i class="fa-solid fa-gear" style="width:20px"></i> Settings</a>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="topbar">
            <button id="mobile-menu-btn" class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')"><i class="fa-solid fa-bars"></i></button>
            <div class="top-title">LOGS</div>
            <div class="topbar-right">
                <div class="search-bar">
                    <i class="fa-solid fa-search text-muted"></i>
                    <input type="text" placeholder="Cari data...">
                </div>
                <a href="#" class="top-icon-btn">
                    <i class="fa-solid fa-bell"></i>
                    <div class="badge"></div>
                </a>
                <a href="/logout" class="btn-logout"><i class="fa-solid fa-power-off"></i> KELUAR</a>
                <div class="user-profile">
                    <span>admin</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="page-header" style="flex-direction: column; gap: 24px;">
                <div class="page-title" style="width: 100%;">
                    <h1>Log Aktivitas</h1>
                    <p>Monitor setiap aktivitas masuk dan riwayat bot secara keseluruhan.</p>
                </div>
                
                <div style="display: flex; gap: 8px; width: 100%; background: var(--bg-card); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; white-space: nowrap;">
                    <button class="btn log-filter" data-type="ALL" style="background: #fff; color: #000; border-radius: 8px; padding: 6px 16px;">ALL</button>
                    <button class="btn log-filter" data-type="LOGIN" style="background: transparent; color: var(--text-muted); padding: 6px 16px;">LOGIN</button>
                    <button class="btn log-filter" data-type="SALE" style="background: transparent; color: var(--text-muted); padding: 6px 16px;">SALE</button>
                    <button class="btn log-filter" data-type="STOCK UPDATE" style="background: transparent; color: var(--text-muted); padding: 6px 16px;">STOCK UPDATE</button>
                    <button class="btn log-filter" data-type="PRICE CHANGE" style="background: transparent; color: var(--text-muted); padding: 6px 16px;">PRICE CHANGE</button>
                    <button class="btn log-filter" data-type="BROADCAST" style="background: transparent; color: var(--text-muted); padding: 6px 16px;">BROADCAST</button>
                    <div style="flex: 1;"></div>
                    <button onclick="clearLogs()" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 6px 16px;"><i class="fa-solid fa-trash"></i> Bersihkan Log</button>
                </div>
            </div>

            <div id="log-container" style="display: flex; flex-direction: column; gap: 12px;">
                <div style="text-align:center; padding: 40px; color: var(--text-muted);">Memuat log aktivitas...</div>
            </div>
        </div>
    </div>

    <script>
        let allLogs = [];
        let currentFilter = 'ALL';

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                if (data.success) {
                    allLogs = data.logs;
                    renderLogs();
                }
            } catch (e) {
                document.getElementById('log-container').innerHTML = '<div style="text-align:center; color: #ef4444; padding: 20px;">Gagal memuat log.</div>';
            }
        }

        function getIconForType(type) {
            switch(type) {
                case 'LOGIN': return { icon: 'fa-arrow-right-to-bracket', color: '56, 189, 248' };
                case 'SALE': return { icon: 'fa-cart-shopping', color: '34, 197, 94' };
                case 'STOCK UPDATE': return { icon: 'fa-box-open', color: '249, 115, 22' };
                case 'PRICE CHANGE': return { icon: 'fa-tag', color: '168, 85, 247' };
                case 'BROADCAST': return { icon: 'fa-bullhorn', color: '236, 72, 153' };
                default: return { icon: 'fa-circle-info', color: '156, 163, 175' };
            }
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            const filteredLogs = currentFilter === 'ALL' ? allLogs : allLogs.filter(l => l.type === currentFilter);
            
            if (filteredLogs.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">Belum ada log aktivitas.</div>';
                return;
            }

            container.innerHTML = filteredLogs.map(log => {
                const d = new Date(log.date);
                const dateStr = d.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const timeStr = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                const style = getIconForType(log.type);
                
                return `
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: 0.2s;">
                    <div style="display: flex; align-items: center; gap: 16px; flex: 1; min-width: 200px;">
                        <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(${style.color}, 0.1); color: rgb(${style.color}); display: flex; justify-content: center; align-items: center; font-size: 16px; border: 1px solid rgba(${style.color}, 0.2); flex-shrink: 0;">
                            <i class="fa-solid ${style.icon}"></i>
                        </div>
                        <div style="word-break: break-word;">
                            <div style="font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">${log.message} <span style="width:6px; height:6px; background:rgb(${style.color}); border-radius:50%; box-shadow: 0 0 8px rgb(${style.color}); display: inline-block;"></span></div>
                            <div style="font-size: 11px; color: var(--text-muted);">${log.details || log.type}</div>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <div style="text-align: right; font-size: 10px; font-weight: 700; color: var(--text-muted);">
                            <div>${dateStr}</div>
                            <div style="margin-top: 2px;">${timeStr}</div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function clearLogs() {
            if (!confirm('Apakah Anda yakin ingin menghapus semua log aktivitas?')) return;
            try {
                const res = await fetch('/api/logs', { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    allLogs = [];
                    renderLogs();
                } else {
                    alert('Gagal menghapus log.');
                }
            } catch(e) {
                alert('Kesalahan jaringan.');
            }
        }

        document.querySelectorAll('.log-filter').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.log-filter').forEach(b => {
                    b.style.background = 'transparent';
                    b.style.color = 'var(--text-muted)';
                });
                e.target.style.background = '#fff';
                e.target.style.color = '#000';
                currentFilter = e.target.getAttribute('data-type');
                renderLogs();
            });
        });

        window.onload = fetchLogs;
    </script>
</body>
</html>
