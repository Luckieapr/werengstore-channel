<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movabi Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0D1117;
            --bg-card: #161B22;
            --primary: #38BDF8;
            --primary-hover: #0284C7;
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
            --border: #30363D;
            --error: #F87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-hover);
            color: #fff;
        }

        .error-msg {
            color: var(--error);
            font-size: 14px;
            margin-top: 15px;
            display: {{error_display}};
            background: rgba(248, 113, 113, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Movabi System</div>
        <div class="subtitle">Secure Bot Dashboard Control</div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="user" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="pass" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn">Masuk Console</button>
        </form>

        <div class="error-msg">
            Kredensial salah! Silakan coba lagi.
        </div>
    </div>

</body>
</html>
